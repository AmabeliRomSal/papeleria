<section class="cart">
    <h2 class="title">Carrito</h2>

    @if (carrito().length === 0) {
        <p class="empty">Carrito vacío.</p>
    } @else {
        <ul class="list">
            @for (producto of carrito(); track producto.idProducto) {
                <li class="item">
                    <span class="line">
                        {{producto.nombre}} - {{producto.precio | currency:'MXN'}}
                    </span>

                    <button class="btn danger" (click)="quitar(producto.idProducto)">
                        quitar
                    </button>
                </li>
            }
        </ul>

        <div class="actions">
            <button class="btn" (click)="vaciar()">Vaciar carrito</button>
            <button class="btn purple" (click)="exportarXml()">Exportar recibo XML</button>
        </div>
    }

</section>
